<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="1000" viewBox="0 0 820 1000" font-family="Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="820" height="1000" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F4E79">PRISMA 2020 Flow Diagram</text>
  <text x="410" y="56" text-anchor="middle" font-size="11" fill="#444">Systematic Literature Review: AI/ML + Gamification + Critical Thinking in Education (Meta_Ozat, 2016–2026)</text>

  <!-- ══════════ PHASE LABELS ══════════ -->
  <!-- Identification -->
  <rect x="8" y="72" width="118" height="250" rx="6" fill="#DEEAF1" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="67" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F4E79" transform="rotate(-90,67,197)">IDENTIFICATION</text>

  <!-- Screening -->
  <rect x="8" y="336" width="118" height="148" rx="6" fill="#E2EFDA" stroke="#70AD47" stroke-width="1.5"/>
  <text x="67" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#375623" transform="rotate(-90,67,410)">SCREENING</text>

  <!-- Eligibility -->
  <rect x="8" y="498" width="118" height="148" rx="6" fill="#FFF2CC" stroke="#ED7D31" stroke-width="1.5"/>
  <text x="67" y="572" text-anchor="middle" font-size="12" font-weight="bold" fill="#7F6000" transform="rotate(-90,67,572)">ELIGIBILITY</text>

  <!-- Included -->
  <rect x="8" y="660" width="118" height="100" rx="6" fill="#FCE4D6" stroke="#C00000" stroke-width="1.5"/>
  <text x="67" y="710" text-anchor="middle" font-size="12" font-weight="bold" fill="#C00000" transform="rotate(-90,67,710)">INCLUDED</text>

  <!-- ══════════ IDENTIFICATION BOXES ══════════ -->

  <!-- Q1 -->
  <rect x="148" y="76" width="240" height="54" rx="5" fill="#F2F7FC" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="268" y="95" text-anchor="middle" font-size="10" font-weight="bold" fill="#1F4E79">RQ1: ML + Personalization</text>
  <text x="268" y="110" text-anchor="middle" font-size="10" fill="#333">Scopus Advanced Search</text>
  <text x="268" y="123" text-anchor="middle" font-size="12" font-weight="bold" fill="#C00000">n = 3,305</text>

  <!-- Q2 -->
  <rect x="148" y="140" width="240" height="54" rx="5" fill="#F2F7FC" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="268" y="159" text-anchor="middle" font-size="10" font-weight="bold" fill="#1F4E79">RQ2: Gamification + AI</text>
  <text x="268" y="174" text-anchor="middle" font-size="10" fill="#333">Scopus Advanced Search</text>
  <text x="268" y="187" text-anchor="middle" font-size="12" font-weight="bold" fill="#C00000">n = 984</text>

  <!-- Q3 -->
  <rect x="148" y="204" width="240" height="54" rx="5" fill="#F2F7FC" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="268" y="223" text-anchor="middle" font-size="10" font-weight="bold" fill="#1F4E79">RQ3: Critical Thinking + NLP</text>
  <text x="268" y="238" text-anchor="middle" font-size="10" fill="#333">Scopus Advanced Search</text>
  <text x="268" y="251" text-anchor="middle" font-size="12" font-weight="bold" fill="#C00000">n = 2,319</text>

  <!-- Q4 -->
  <rect x="148" y="268" width="240" height="54" rx="5" fill="#F2F7FC" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="268" y="287" text-anchor="middle" font-size="10" font-weight="bold" fill="#1F4E79">RQ4: Learning Path Recommendation</text>
  <text x="268" y="302" text-anchor="middle" font-size="10" fill="#333">Scopus Advanced Search</text>
  <text x="268" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#C00000">n = 2,194</text>

  <!-- Subtotal / before dedup -->
  <rect x="450" y="76" width="230" height="54" rx="5" fill="#FFF2CC" stroke="#ED7D31" stroke-width="1.5"/>
  <text x="565" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#7F6000">Records identified (5 queries)</text>
  <text x="565" y="112" text-anchor="middle" font-size="10" fill="#333">before deduplication</text>
  <text x="565" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#C00000">n = 9,281</text>

  <!-- Q5 box separate (right) -->
  <rect x="450" y="140" width="230" height="54" rx="5" fill="#F2F7FC" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="565" y="159" text-anchor="middle" font-size="10" font-weight="bold" fill="#1F4E79">RQ5: Kazakhstan / Central Asia</text>
  <text x="565" y="174" text-anchor="middle" font-size="10" fill="#333">Scopus Advanced Search</text>
  <text x="565" y="187" text-anchor="middle" font-size="12" font-weight="bold" fill="#C00000">n = 479</text>

  <!-- Duplicates removed -->
  <rect x="450" y="260" width="230" height="60" rx="5" fill="#FCE4D6" stroke="#C00000" stroke-width="1.5"/>
  <text x="565" y="282" text-anchor="middle" font-size="10" font-weight="bold" fill="#C00000">Records removed as duplicates</text>
  <text x="565" y="296" text-anchor="middle" font-size="10" fill="#333">(via master OR query)</text>
  <text x="565" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#C00000">n = 4,885</text>

  <!-- Arrows identification section -->
  <!-- Q1-Q4 → right total -->
  <line x1="388" y1="103" x2="450" y2="103" stroke="#2E75B6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="388" y1="167" x2="420" y2="167" stroke="#2E75B6" stroke-width="1.5"/>
  <line x1="388" y1="231" x2="420" y2="231" stroke="#2E75B6" stroke-width="1.5"/>
  <line x1="388" y1="295" x2="420" y2="295" stroke="#2E75B6" stroke-width="1.5"/>
  <line x1="420" y1="103" x2="420" y2="295" stroke="#2E75B6" stroke-width="1.5"/>
  <!-- Q5 → subtotal -->
  <line x1="565" y1="194" x2="565" y2="210" stroke="#2E75B6" stroke-width="1.5"/>
  <line x1="420" y1="295" x2="450" y2="295" stroke="#2E75B6" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ══════════ SCREENING BOX ══════════ -->

  <!-- Records after dedup (main flow arrow down) -->
  <rect x="148" y="336" width="280" height="60" rx="5" fill="#E2EFDA" stroke="#70AD47" stroke-width="2"/>
  <text x="288" y="358" text-anchor="middle" font-size="10" font-weight="bold" fill="#375623">Records after duplicates removed</text>
  <text x="288" y="374" text-anchor="middle" font-size="10" fill="#333">PRISMA_Screening_MetaOzat.xlsx</text>
  <text x="288" y="389" text-anchor="middle" font-size="13" font-weight="bold" fill="#375623">n = 4,396</text>

  <!-- Arrow from subtotal (9281) down to dedup box -->
  <line x1="565" y1="130" x2="580" y2="130" stroke="#ED7D31" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="565" y1="260" x2="565" y2="230" stroke="#C00000" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="565" y1="130" x2="565" y2="260" stroke="#C00000" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow: dedup removes → records screened -->
  <line x1="450" y1="290" x2="430" y2="290" stroke="#C00000" stroke-width="1.5"/>
  <line x1="430" y1="290" x2="430" y2="366" stroke="#C00000" stroke-width="1.5"/>
  <line x1="430" y1="366" x2="428" y2="366" stroke="#C00000" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Down arrow into screening -->
  <line x1="288" y1="330" x2="288" y2="336" stroke="#70AD47" stroke-width="2" marker-end="url(#arr3)"/>
  <!-- main down from identification to screening -->
  <line x1="288" y1="322" x2="288" y2="338" stroke="#1F4E79" stroke-width="2"/>

  <!-- Records excluded stage1 -->
  <rect x="480" y="340" width="230" height="60" rx="5" fill="#FCE4D6" stroke="#C00000" stroke-width="1.5"/>
  <text x="595" y="362" text-anchor="middle" font-size="10" font-weight="bold" fill="#C00000">Records excluded</text>
  <text x="595" y="376" text-anchor="middle" font-size="10" fill="#333">(Title/Abstract irrelevant)</text>
  <text x="595" y="392" text-anchor="middle" font-size="12" font-weight="bold" fill="#C00000">n = 4,096</text>

  <!-- Arrow Stage1 excluded -->
  <line x1="428" y1="366" x2="480" y2="366" stroke="#C00000" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════ ELIGIBILITY BOX ══════════ -->
  <rect x="148" y="500" width="280" height="60" rx="5" fill="#FFF2CC" stroke="#ED7D31" stroke-width="2"/>
  <text x="288" y="522" text-anchor="middle" font-size="10" font-weight="bold" fill="#7F6000">Reports sought for retrieval</text>
  <text x="288" y="538" text-anchor="middle" font-size="10" fill="#333">(full-text review, Stage 2)</text>
  <text x="288" y="553" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F6000">n = 300</text>

  <!-- Arrow down screening → eligibility -->
  <line x1="288" y1="396" x2="288" y2="500" stroke="#70AD47" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Reports excluded Stage2 -->
  <rect x="480" y="504" width="230" height="74" rx="5" fill="#FCE4D6" stroke="#C00000" stroke-width="1.5"/>
  <text x="595" y="524" text-anchor="middle" font-size="10" font-weight="bold" fill="#C00000">Reports excluded</text>
  <text x="595" y="538" text-anchor="middle" font-size="10" fill="#333">Reasons (MMAT 2018):</text>
  <text x="595" y="552" text-anchor="middle" font-size="9" fill="#666">• Low quality score</text>
  <text x="595" y="564" text-anchor="middle" font-size="9" fill="#666">• No ML/AI method described</text>
  <text x="595" y="576" text-anchor="middle" font-size="12" font-weight="bold" fill="#C00000">n = 227</text>

  <line x1="428" y1="530" x2="480" y2="530" stroke="#C00000" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════ INCLUDED BOX ══════════ -->
  <rect x="148" y="664" width="280" height="80" rx="5" fill="#E2EFDA" stroke="#375623" stroke-width="2.5"/>
  <text x="288" y="683" text-anchor="middle" font-size="11" font-weight="bold" fill="#375623">Studies included in SLR</text>
  <text x="288" y="698" text-anchor="middle" font-size="10" fill="#333">(73 database + 9 snowballing RQ5)</text>
  <text x="288" y="713" text-anchor="middle" font-size="10" fill="#555">qualitative + quantitative synthesis</text>
  <text x="288" y="732" text-anchor="middle" font-size="14" font-weight="bold" fill="#375623">n = 82</text>

  <!-- Arrow eligibility → included -->
  <line x1="288" y1="560" x2="288" y2="664" stroke="#ED7D31" stroke-width="2" marker-end="url(#arr4)"/>
  <!-- Snowballing side note -->
  <rect x="450" y="660" width="240" height="54" rx="5" fill="#E2EFDA" stroke="#375623" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="570" y="679" text-anchor="middle" font-size="9" font-weight="bold" fill="#375623">Snowballing (RQ5 supplementary)</text>
  <text x="570" y="693" text-anchor="middle" font-size="9" fill="#444">IEEE Xplore, Google Scholar,</text>
  <text x="570" y="706" text-anchor="middle" font-size="9" fill="#444">ERIC, CyberLeninka</text>
  <text x="570" y="718" text-anchor="middle" font-size="11" font-weight="bold" fill="#375623">+9 papers</text>
  <line x1="450" y1="690" x2="428" y2="700" stroke="#375623" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr3)"/>

  <!-- ══════════ LEGEND / NOTES ══════════ -->
  <rect x="148" y="770" width="562" height="100" rx="5" fill="#F7F7F7" stroke="#AAAAAA" stroke-width="1"/>
  <text x="165" y="788" font-size="10" font-weight="bold" fill="#1F4E79">Notes:</text>
  <text x="165" y="803" font-size="9" fill="#444">Search period: January 2016 – December 2024 (sensitivity check extended to April 2026) | Filters: Article &amp; Review, English</text>
  <text x="165" y="817" font-size="9" fill="#444">Primary: Scopus (5 targeted RQ queries → 9,281 records → 4,396 after master OR dedup, exported April 4 2026)</text>
  <text x="165" y="831" font-size="9" fill="#444">Parallel: OpenAlex aggregator (n=4,152; cross-validation confirmed 85.4% overlap with final corpus)</text>
  <text x="165" y="845" font-size="9" fill="#444">Snowballing (RQ5): IEEE Xplore, Google Scholar, ERIC, CyberLeninka → +9 Kazakhstan/Central Asia papers</text>
  <text x="165" y="859" font-size="9" fill="#444">Quality assessment: MMAT 2018 (mean=3.88; sensitivity Tier 1+2 n=80, 97.6%) | Protocol: PRISMA 2020</text>

  <!-- ══════════ ARROW MARKERS ══════════ -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1F4E79"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C00000"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#70AD47"/>
    </marker>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ED7D31"/>
    </marker>
  </defs>

  <!-- Main vertical flow line (left-center) -->
  <line x1="288" y1="130" x2="288" y2="336" stroke="#1F4E79" stroke-width="2.5" stroke-dasharray="6,3"/>

</svg>